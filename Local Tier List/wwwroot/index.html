<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Local Tier List</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="Local Tier List.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body style="background-color: #31226C">

    <div class="status-bar-safe-area"></div>

    <div id="app" style="color: white; margin: 0; justify-content: center; align-items: center; align-content: center">
        <div style="display: flex; margin: 0; justify-content: center; align-items: center; align-content: center">
            <h1 style="padding-top: 30vh">Loading TierLists...</h1>
        </div>
        
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

    <script>
        const localmediaCache = new Map();

        window.hasCachedMedia = key => localmediaCache.has(key);

        window.getCachedMedia = key => localmediaCache.get(key);

        window.setMediaSource = async (elementId, streamRef, contentType) => {
            const arrayBuffer = await streamRef.arrayBuffer();
            const blob = new Blob([arrayBuffer], { type: contentType });
            const url = URL.createObjectURL(blob);

            const element = document.getElementById(elementId);
            element.src = url;

            if (element.tagName.toLowerCase() === "img") {
                element.onload = () => URL.revokeObjectURL(url);
            } else {
                element.onended = () => URL.revokeObjectURL(url);
            }
        };
        window.cacheMedia = async (className, streamRef, contentType) => {
            const arrayBuffer = await streamRef.arrayBuffer();
            const blob = new Blob([arrayBuffer], { type: contentType });
            let url = URL.createObjectURL(blob);

            localmediaCache.set(className, url);
            return url;
        }
        window.setMediaSourceForClass = async (className, streamRef, contentType) => {
            let url = localmediaCache.get(className);

            if (!url) {
                url = await window.cacheMedia(className, streamRef, contentType);
            }

            document.querySelectorAll(`.${className}`).forEach(element => {
                element.src = url;
            });
            return url;
        };

        window.createBlobUrl = (byteArray, mimeType) => {
            const blob = new Blob([new Uint8Array(byteArray)], { type: mimeType });
            return URL.createObjectURL(blob);
        };

        window.revokeBlobUrl = (url) => URL.revokeObjectURL(url);
    </script>

</body>

</html>
